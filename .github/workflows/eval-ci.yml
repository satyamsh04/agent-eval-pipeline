name: Agent Evaluation CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    name: Test → Evaluate → Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (strict)
        run: npm run typecheck

      - name: Run unit + integration tests
        run: npm test

      - name: Run evaluation on fixtures + regression gate
        id: eval
        # GitHub's bash shell runs with `set -eo pipefail`, so a regression
        # (non-zero exit from run-eval) fails the job even through the pipe.
        run: |
          npm run --silent eval | tee eval-results/report.md

      - name: Comment evaluation results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Agent Evaluation Report\n\n_No report was produced._';
            try {
              body = fs.readFileSync('eval-results/report.md', 'utf8');
            } catch (e) {
              core.warning('report.md not found: ' + e.message);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval-results/latest.json
            eval-results/report.md
          if-no-files-found: ignore
